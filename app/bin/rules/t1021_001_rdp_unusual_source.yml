title: RDP Logon from External Source
id: t1021_001_rdp_external
status: experimental
description: >
  Detects a successful interactive or remote interactive logon (Type 10 = RemoteInteractive)
  originating from an IP that is not part of the internal RFC1918 ranges. Strong indicator
  of lateral movement from an attacker foothold or direct remote compromise.
references:
  - https://attack.mitre.org/techniques/T1021/001/
author: Jacob Hess
level: high
tags:
  - attack.lateral_movement
  - attack.t1021.001
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: '10'
  filter_internal:
    IpAddress|re: '^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|127\.|::1|fe80:)'
  condition: selection and not filter_internal
falsepositives:
  - Admin jumping in from a corporate VPN exit node with a public IP
  - Third-party support sessions
