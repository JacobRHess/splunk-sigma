title: LSASS Credential Dump Indicators
id: t1003_001_lsass_dump
status: experimental
description: >
  Detects known tooling used to dump credentials from LSASS memory — Mimikatz
  command syntax, procdump targeting lsass.exe, or comsvcs.dll MiniDump invocation.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: Jacob Hess
level: critical
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_mimikatz_cli:
    CommandLine|contains:
      - 'sekurlsa::'
      - 'lsadump::'
      - 'privilege::debug'
  selection_procdump_lsass:
    Image|endswith:
      - '\procdump.exe'
      - '\procdump64.exe'
    CommandLine|contains: 'lsass'
  selection_comsvcs_minidump:
    CommandLine|contains:
      - 'comsvcs.dll,MiniDump'
      - 'comsvcs.dll MiniDump'
  condition: 1 of selection_*
falsepositives:
  - Sysinternals procdump used by IT for authorized crash analysis
